<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Ventas - Sistema de Bebidas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .nav-item { transition: all 0.3s ease; }
        .nav-item:hover { background: rgba(255, 255, 255, 0.1); }
        .nav-item.active { background: rgba(255, 255, 255, 0.2); }
        .sale-card { transition: all 0.3s ease; }
        .sale-card:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .input-focus { transition: all 0.3s ease; }
        .input-focus:focus { transform: scale(1.02); box-shadow: 0 0 20px rgba(147, 51, 234, 0.3); }
        .profit-positive { color: #10b981; }
        .profit-negative { color: #ef4444; }
        .stock-warning { background: #fef3c7; color: #92400e; }
        .stock-danger { background: #fee2e2; color: #991b1b; }
        .fade-in { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Navigation Bar -->
    <nav class="gradient-bg shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center">
                    <button onclick="window.location.href='dashboard.html'" class="nav-item px-3 py-2 rounded-lg text-white/80 hover:text-white mr-4">
                        <i class="fas fa-arrow-left mr-1"></i>
                        Volver
                    </button>
                    <div class="flex-shrink-0">
                        <div class="flex items-center">
                            <i class="fas fa-chart-line text-2xl text-white mr-3"></i>
                            <h1 class="text-xl font-bold text-white">Registro de Ventas</h1>
                        </div>
                    </div>
                </div>
                
                <div class="flex items-center space-x-4">
                    <button id="newSaleBtn" class="nav-item px-3 py-2 rounded-lg text-white/80 hover:text-white">
                        <i class="fas fa-plus mr-1"></i>
                        Nueva Venta
                    </button>
                    <button id="logoutBtn" class="nav-item px-3 py-2 rounded-lg text-white/80 hover:text-white">
                        <i class="fas fa-sign-out-alt mr-1"></i>
                        Cerrar Sesión
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Header -->
        <div class="mb-8 fade-in">
            <div class="flex justify-between items-center">
                <div>
                    <h2 class="text-3xl font-bold text-gray-800">Ventas</h2>
                    <p class="text-gray-600">Control de ventas con cálculo de márgenes en tiempo real</p>
                </div>
                <div class="flex space-x-4">
                    <div class="bg-white rounded-lg shadow p-4">
                        <p class="text-sm text-gray-600">Ventas Hoy</p>
                        <p id="todaySales" class="text-2xl font-bold text-purple-600">$0.00</p>
                    </div>
                    <div class="bg-white rounded-lg shadow p-4">
                        <p class="text-sm text-gray-600">Margen Promedio</p>
                        <p id="avgMargin" class="text-2xl font-bold text-green-600">0%</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Filters -->
        <div class="bg-white rounded-xl shadow-lg p-6 mb-6 fade-in">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Fecha</label>
                    <input type="date" id="filterDate" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Cliente</label>
                    <select id="filterClient" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent">
                        <option value="">Todos los clientes</option>
                        <option value="CLIENTE A">CLIENTE A</option>
                        <option value="CLIENTE B">CLIENTE B</option>
                        <option value="CLIENTE C">CLIENTE C</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Sociedad</label>
                    <select id="filterCompany" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent">
                        <option value="">Todas las sociedades</option>
                        <option value="WARNES S.A.">WARNES S.A.</option>
                        <option value="BEBIDAS DEL SUR">BEBIDAS DEL SUR</option>
                        <option value="DISTRIBUIDORA NORTE">DISTRIBUIDORA NORTE</option>
                    </select>
                </div>
                <div class="flex items-end">
                    <button id="clearFilters" class="w-full bg-gray-600 hover:bg-gray-700 text-white px-4 py-3 rounded-lg font-medium transition-colors">
                        <i class="fas fa-times mr-2"></i>
                        Limpiar
                    </button>
                </div>
            </div>
        </div>

        <!-- Sales List -->
        <div class="bg-white rounded-xl shadow-lg overflow-hidden fade-in">
            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-6 py-4 text-left text-sm font-semibold text-gray-700">Fecha</th>
                            <th class="px-6 py-4 text-left text-sm font-semibold text-gray-700">Cliente</th>
                            <th class="px-6 py-4 text-left text-sm font-semibold text-gray-700">Artículo</th>
                            <th class="px-6 py-4 text-left text-sm font-semibold text-gray-700">Cantidad</th>
                            <th class="px-6 py-4 text-left text-sm font-semibold text-gray-700">PU Venta</th>
                            <th class="px-6 py-4 text-left text-sm font-semibold text-gray-700">Venta Total</th>
                            <th class="px-6 py-4 text-left text-sm font-semibold text-gray-700">Costo Total</th>
                            <th class="px-6 py-4 text-left text-sm font-semibold text-gray-700">Margen</th>
                            <th class="px-6 py-4 text-left text-sm font-semibold text-gray-700">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="salesTable" class="divide-y divide-gray-200">
                        <!-- Las filas se cargarán dinámicamente -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="hidden text-center py-12">
            <i class="fas fa-inbox text-4xl text-gray-300 mb-4"></i>
            <p class="text-gray-600">No se encontraron ventas</p>
        </div>
    </div>

    <!-- Sale Modal -->
    <div id="saleModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
        <div class="bg-white rounded-xl shadow-2xl max-w-4xl w-full mx-4 max-h-screen overflow-y-auto">
            <div class="p-6 border-b border-gray-200">
                <div class="flex justify-between items-center">
                    <h3 id="modalTitle" class="text-xl font-semibold text-gray-800">Nueva Venta</h3>
                    <button id="closeModal" class="text-gray-400 hover:text-gray-600">
                        <i class="fas fa-times text-xl"></i>
                    </button>
                </div>
            </div>
            
            <form id="saleForm" class="p-6 space-y-6">
                <!-- Header Information -->
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Fecha *</label>
                        <input type="date" id="saleDate" required 
                               class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent input-focus">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Cliente *</label>
                        <select id="client" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent input-focus">
                            <option value="">Seleccionar cliente</option>
                            <option value="CLIENTE A">CLIENTE A</option>
                            <option value="CLIENTE B">CLIENTE B</option>
                            <option value="CLIENTE C">CLIENTE C</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Sociedad *</label>
                        <select id="company" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent input-focus">
                            <option value="">Seleccionar sociedad</option>
                            <option value="WARNES S.A.">WARNES S.A.</option>
                            <option value="BEBIDAS DEL SUR">BEBIDAS DEL SUR</option>
                            <option value="DISTRIBUIDORA NORTE">DISTRIBUIDORA NORTE</option>
                        </select>
                    </div>
                </div>

                <!-- Sale Details -->
                <div class="border-t border-gray-200 pt-6">
                    <h4 class="text-lg font-semibold text-gray-800 mb-4">Detalle de Venta</h4>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Artículo *</label>
                            <select id="article" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent input-focus">
                                <option value="">Seleccionar artículo</option>
                                <option value="COCA-001">COCA-001 - Coca Cola 1.5L</option>
                                <option value="PEPS-002">PEPS-002 - Pepsi 2.25L</option>
                                <option value="QUIL-003">QUIL-003 - Quilmes 1L</option>
                                <option value="BRAH-004">BRAH-004 - Brahma 1L</option>
                            </select>
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Stock Disponible</label>
                            <input type="number" id="stockAvailable" readonly 
                                   class="w-full px-4 py-3 border border-gray-300 rounded-lg bg-gray-100 text-gray-600">
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Cantidad *</label>
                            <input type="number" id="quantity" step="0.01" min="0.01" required value="1" 
                                   class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent input-focus">
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Precio Unitario *</label>
                            <div class="relative">
                                <span class="absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-500">$</span>
                                <input type="number" id="unitPrice" step="0.01" min="0.01" required 
                                       class="w-full pl-8 pr-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent input-focus">
                            </div>
                        </div>
                    </div>
                    
                    <!-- Calculated Fields -->
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Venta Total</label>
                            <div class="relative">
                                <span class="absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-500">$</span>
                                <input type="number" id="totalSale" step="0.01" readonly 
                                       class="w-full pl-8 pr-4 py-3 border border-gray-300 rounded-lg bg-gray-100 text-gray-600">
                            </div>
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Costo Total</label>
                            <div class="relative">
                                <span class="absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-500">$</span>
                                <input type="number" id="totalCost" step="0.01" readonly 
                                       class="w-full pl-8 pr-4 py-3 border border-gray-300 rounded-lg bg-gray-100 text-gray-600">
                            </div>
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Margen</label>
                            <div class="relative">
                                <span class="absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-500">$</span>
                                <input type="number" id="margin" step="0.01" readonly 
                                       class="w-full pl-8 pr-4 py-3 border border-gray-300 rounded-lg bg-gray-100 text-gray-600">
                            </div>
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">% Margen</label>
                            <div class="relative">
                                <input type="number" id="marginPercent" step="0.01" readonly 
                                       class="w-full pr-8 pl-4 py-3 border border-gray-300 rounded-lg bg-gray-100 text-gray-600">
                                <span class="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-500">%</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Observations -->
                <div class="border-t border-gray-200 pt-6">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Observaciones</label>
                    <textarea id="observations" rows="3" 
                              class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent"
                              placeholder="Notas adicionales sobre la venta..."></textarea>
                </div>

                <!-- Actions -->
                <div class="flex justify-end space-x-4 pt-6 border-t border-gray-200">
                    <button type="button" id="cancelSale" class="px-6 py-3 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50 transition-colors">
                        Cancelar
                    </button>
                    <button type="submit" id="saveSale" class="px-6 py-3 bg-purple-600 hover:bg-purple-700 text-white rounded-lg font-medium transition-colors">
                        <i class="fas fa-save mr-2"></i>
                        Guardar Venta
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Verificar autenticación
        const currentUser = localStorage.getItem('currentUser');
        if (!currentUser) {
            window.location.href = 'index.html';
        }

        // Variables globales
        let sales = [];
        let stockData = {
            'COCA-001': { stock: 150, costo: 2.50 },
            'PEPS-002': { stock: 80, costo: 2.30 },
            'QUIL-003': { stock: 200, costo: 1.80 },
            'BRAH-004': { stock: 120, costo: 1.90 }
        };

        // Cerrar sesión
        document.getElementById('logoutBtn').addEventListener('click', function() {
            localStorage.removeItem('currentUser');
            window.location.href = 'index.html';
        });

        // Modal functionality
        const modal = document.getElementById('saleModal');
        const modalTitle = document.getElementById('modalTitle');
        const form = document.getElementById('saleForm');

        document.getElementById('newSaleBtn').addEventListener('click', openNewSaleModal);
        document.getElementById('closeModal').addEventListener('click', closeSaleModal);
        document.getElementById('cancelSale').addEventListener('click', closeSaleModal);

        function openNewSaleModal() {
            modalTitle.textContent = 'Nueva Venta';
            document.getElementById('saleDate').value = new Date().toISOString().split('T')[0];
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            
            anime({
                targets: '#saleModal .bg-white',
                scale: [0.9, 1],
                opacity: [0, 1],
                duration: 300,
                easing: 'easeOutQuad'
            });
        }

        function closeSaleModal() {
            anime({
                targets: '#saleModal .bg-white',
                scale: [1, 0.9],
                opacity: [1, 0],
                duration: 200,
                easing: 'easeInQuad',
                complete: () => {
                    modal.classList.add('hidden');
                    modal.classList.remove('flex');
                    form.reset();
                }
            });
        }

        // Actualizar stock disponible al seleccionar artículo
        document.getElementById('article').addEventListener('change', function() {
            const articleCode = this.value;
            const stockInput = document.getElementById('stockAvailable');
            
            if (stockData[articleCode]) {
                stockInput.value = stockData[articleCode].stock;
                updateStockWarning(stockData[articleCode].stock);
            } else {
                stockInput.value = '';
            }
            
            calculateSaleTotals();
        });

        // Calcular totales automáticamente
        function setupAutoCalculation() {
            const inputs = ['quantity', 'unitPrice'];
            inputs.forEach(id => {
                document.getElementById(id).addEventListener('input', calculateSaleTotals);
            });
        }

        function calculateSaleTotals() {
            const quantity = parseFloat(document.getElementById('quantity').value) || 0;
            const unitPrice = parseFloat(document.getElementById('unitPrice').value) || 0;
            const articleCode = document.getElementById('article').value;
            
            const totalSale = quantity * unitPrice;
            document.getElementById('totalSale').value = totalSale.toFixed(2);
            
            if (stockData[articleCode]) {
                const totalCost = quantity * stockData[articleCode].costo;
                const margin = totalSale - totalCost;
                const marginPercent = totalSale > 0 ? (margin / totalSale * 100) : 0;
                
                document.getElementById('totalCost').value = totalCost.toFixed(2);
                document.getElementById('margin').value = margin.toFixed(2);
                document.getElementById('marginPercent').value = marginPercent.toFixed(2);
                
                // Actualizar color del margen
                const marginInput = document.getElementById('marginPercent');
                marginInput.className = marginPercent >= 0 ? 
                    'w-full pr-8 pl-4 py-3 border border-gray-300 rounded-lg bg-gray-100 profit-positive' :
                    'w-full pr-8 pl-4 py-3 border border-gray-300 rounded-lg bg-gray-100 profit-negative';
            }
        }

        // Advertencia de stock bajo
        function updateStockWarning(stock) {
            const stockInput = document.getElementById('stockAvailable');
            stockInput.className = stock <= 10 ? 
                'w-full px-4 py-3 border border-gray-300 rounded-lg stock-danger' :
                stock <= 20 ? 
                'w-full px-4 py-3 border border-gray-300 rounded-lg stock-warning' :
                'w-full px-4 py-3 border border-gray-300 rounded-lg bg-gray-100 text-gray-600';
        }

        // Guardar venta
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const saleData = {
                id: Date.now(),
                date: document.getElementById('saleDate').value,
                client: document.getElementById('client').value,
                company: document.getElementById('company').value,
                article: document.getElementById('article').value,
                quantity: parseFloat(document.getElementById('quantity').value),
                unitPrice: parseFloat(document.getElementById('unitPrice').value),
                totalSale: parseFloat(document.getElementById('totalSale').value),
                totalCost: parseFloat(document.getElementById('totalCost').value),
                margin: parseFloat(document.getElementById('margin').value),
                marginPercent: parseFloat(document.getElementById('marginPercent').value),
                observations: document.getElementById('observations').value
            };
            
            // Validar stock disponible
            const articleCode = saleData.article;
            if (stockData[articleCode] && saleData.quantity > stockData[articleCode].stock) {
                alert('Error: Stock insuficiente para esta venta');
                return;
            }
            
            // Actualizar stock
            if (stockData[articleCode]) {
                stockData[articleCode].stock -= saleData.quantity;
            }
            
            sales.push(saleData);
            renderSales();
            updateStats();
            closeSaleModal();
            
            // Mostrar notificación de éxito
            showNotification('Venta registrada exitosamente', 'success');
        });

        // Renderizar tabla de ventas
        function renderSales(filteredSales = sales) {
            const tbody = document.getElementById('salesTable');
            
            if (filteredSales.length === 0) {
                document.getElementById('emptyState').classList.remove('hidden');
                tbody.innerHTML = '';
                return;
            }
            
            document.getElementById('emptyState').classList.add('hidden');
            
            tbody.innerHTML = filteredSales.map(sale => `
                <tr class="hover:bg-gray-50">
                    <td class="px-6 py-4 text-sm text-gray-900">${formatDate(sale.date)}</td>
                    <td class="px-6 py-4 text-sm text-gray-900">${sale.client}</td>
                    <td class="px-6 py-4 text-sm text-gray-900">${sale.article}</td>
                    <td class="px-6 py-4 text-sm text-gray-500">${sale.quantity}</td>
                    <td class="px-6 py-4 text-sm text-gray-500">$${sale.unitPrice.toFixed(2)}</td>
                    <td class="px-6 py-4 text-sm font-medium text-gray-900">$${sale.totalSale.toFixed(2)}</td>
                    <td class="px-6 py-4 text-sm text-gray-500">$${sale.totalCost.toFixed(2)}</td>
                    <td class="px-6 py-4 text-sm font-medium ${sale.marginPercent >= 0 ? 'profit-positive' : 'profit-negative'}">
                        ${sale.marginPercent.toFixed(1)}%
                    </td>
                    <td class="px-6 py-4">
                        <button onclick="deleteSale(${sale.id})" class="text-red-600 hover:text-red-800">
                            <i class="fas fa-trash"></i>
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        // Formatear fecha
        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('es-AR');
        }

        // Eliminar venta
        function deleteSale(id) {
            if (confirm('¿Estás seguro de eliminar esta venta?')) {
                const saleIndex = sales.findIndex(s => s.id === id);
                if (saleIndex !== -1) {
                    const sale = sales[saleIndex];
                    
                    // Devolver stock
                    if (stockData[sale.article]) {
                        stockData[sale.article].stock += sale.quantity;
                    }
                    
                    sales.splice(saleIndex, 1);
                    renderSales();
                    updateStats();
                    showNotification('Venta eliminada', 'info');
                }
            }
        }

        // Actualizar estadísticas
        function updateStats() {
            const today = new Date().toISOString().split('T')[0];
            const todaySales = sales.filter(s => s.date === today);
            const totalToday = todaySales.reduce((sum, s) => sum + s.totalSale, 0);
            const avgMargin = sales.length > 0 ? 
                sales.reduce((sum, s) => sum + s.marginPercent, 0) / sales.length : 0;
            
            document.getElementById('todaySales').textContent = '$' + totalToday.toFixed(2);
            document.getElementById('avgMargin').textContent = avgMargin.toFixed(1) + '%';
        }

        // Filtros
        document.getElementById('filterDate').addEventListener('change', filterSales);
        document.getElementById('filterClient').addEventListener('change', filterSales);
        document.getElementById('filterCompany').addEventListener('change', filterSales);
        document.getElementById('clearFilters').addEventListener('click', clearFilters);

        function filterSales() {
            const dateFilter = document.getElementById('filterDate').value;
            const clientFilter = document.getElementById('filterClient').value;
            const companyFilter = document.getElementById('filterCompany').value;
            
            const filtered = sales.filter(sale => {
                const matchesDate = !dateFilter || sale.date === dateFilter;
                const matchesClient = !clientFilter || sale.client === clientFilter;
                const matchesCompany = !companyFilter || sale.company === companyFilter;
                
                return matchesDate && matchesClient && matchesCompany;
            });
            
            renderSales(filtered);
        }

        function clearFilters() {
            document.getElementById('filterDate').value = '';
            document.getElementById('filterClient').value = '';
            document.getElementById('filterCompany').value = '';
            renderSales();
        }

        // Notificaciones
        function showNotification(message, type = 'info') {
            const notification = document.createElement('div');
            notification.className = `fixed top-4 right-4 p-4 rounded-lg shadow-lg z-50 ${
                type === 'success' ? 'bg-green-500 text-white' :
                type === 'error' ? 'bg-red-500 text-white' :
                'bg-blue-500 text-white'
            }`;
            notification.textContent = message;
            
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.remove();
            }, 3000);
        }
